<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PyScript → JS Transpiler</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

<style>
/* KEEPING YOUR STYLE CLEAN BUT SLIGHTLY SIMPLIFIED */
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f4f5f7;color:#2775d3;font-family:'JetBrains Mono',monospace;height:100vh;}

.app{display:grid;grid-template-rows:60px 1fr;height:100vh;}

header{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 20px;border-bottom:1px solid #21262f;
}

.logo{font-family:'Syne';font-weight:800;font-size:18px;}

.workspace{
  display:grid;
  grid-template-columns:1fr 1fr;
  height:100%;
}

/* LEFT PANEL */
.editor-pane{
  display:flex;
  flex-direction:column;
  border-right:1px solid #1e293b;
}

textarea{
  flex:1;
  background:#f4f5f7;
  border:none;
  color:#171b1f;
  padding:15px;
  resize:none;
  outline:none;
}

/* BUTTONS */
.toolbar{
  padding:10px;
  display:flex;
  gap:10px;
}

button{
  padding:8px 16px;
  border:none;
  background:#6366f1;
  color:white;
  cursor:pointer;
  border-radius:4px;
  font-weight:600;
}

button:disabled{
  opacity:.5;
}

/* RIGHT PANEL */
.output-pane{
  display:flex;
  flex-direction:column;
}

.tab-bar{
  display:flex;
  border-bottom:1px solid #93aedb;
}

.tab{
  padding:10px 14px;
  cursor:pointer;
  color:#383d44;
}

.tab.active{
  color:#6fa0d8;
  border-bottom:2px solid #6fa0d8;
}

.panel-body{
  flex:1;
  overflow:auto;
  padding:15px;
}

pre{
  background:#c1c5d4;
  padding:15px;
  border-radius:6px;
  white-space:pre-wrap;
}

.loading{
  color:#010102;
}
</style>
</head>

<body>

<div class="app">

<header>
  <div class="logo">Py → JS Transpiler</div>
  <div style="font-size:12px;color:#5b96e9;">Sign UP</div>
</header>

<div class="workspace">

<!-- LEFT SIDE -->
<div class="editor-pane">
  <textarea id="editor" placeholder="# Write Python code here...

x = 10
print(x)"></textarea>

  <div class="toolbar">
    <button id="btnRun">Transpile</button>
    <button id="btnClear">Clear</button>
  </div>
</div>

<!-- RIGHT SIDE -->
<div class="output-pane">

  <div class="tab-bar">
    <div class="tab active" data-tab="tokens">Tokens</div>
    <div class="tab" data-tab="ast">AST</div>
    <div class="tab" data-tab="sym">Symbol Table</div>
    <div class="tab" data-tab="semantic">Semantic</div>
    <div class="tab" data-tab="opt">Optimized AST</div>
    <div class="tab" data-tab="js">JS Code</div>
  </div>

  <div class="panel-body">
    <pre id="output">Write code and click Transpile...</pre>
  </div>

</div>
</div>
</div>

<script>
// ─────────────────────────────────────────────────────────
// LEXER — exact port of lexer.py
// ─────────────────────────────────────────────────────────

// TokenType — same names and values as TokenType in lexer.py
const TokenType = {
  DEF:"def", IF:"if", ELIF:"elif", ELSE:"else", FOR:"for", WHILE:"while",
  IN:"in", RETURN:"return", PRINT:"print", TRUE:"True", FALSE:"False",
  NONE:"None", AND:"and", OR:"or", NOT:"not",
  IDENTIFIER:"IDENTIFIER", NUMBER:"NUMBER", STRING:"STRING",
  PLUS:"+", MINUS:"-", MULTIPLY:"*", DIVIDE:"/", FLOOR_DIVIDE:"//",
  MODULO:"%", POWER:"**", EQUALS:"=", DOUBLE_EQUALS:"==", NOT_EQUALS:"!=",
  LESS_THAN:"<", GREATER_THAN:">", LESS_EQUAL:"<=", GREATER_EQUAL:">=",
  LPAREN:"(", RPAREN:")", COMMA:",", COLON:":",
  NEWLINE:"NEWLINE", INDENT:"INDENT", DEDENT:"DEDENT", COMMENT:"COMMENT", EOF:"EOF"
};

// reverse lookup: value → name  (mirrors Python Enum.name)
const _ttName = {};
for (const [name, value] of Object.entries(TokenType)) _ttName[value] = name;
function ttName(type) { return _ttName[type] || type; }

// class Token — same as Token in lexer.py
class Token {
  constructor(token_type, value, line, column) {
    this.type = token_type; this.value = value;
    this.line = line; this.column = column;
  }
}

// class LexerError — same as LexerError in lexer.py
class LexerError extends Error {
  constructor(message, line, column, suggestion = null) {
    super(message);
    this.message = message; this.line = line;
    this.column = column; this.suggestion = suggestion;
  }
}

// class Lexer — exact port of Lexer in lexer.py
class Lexer {
  constructor(code) {
    this.code = code;
    this.tokens = [];
    this.indent_stack = [0];
    this.keywords = new Set([
      "def","if","elif","else","for","while","in",
      "return","print","True","False","None","and","or","not"
    ]);
  }

  // mirrors Lexer.tokenize()
  tokenize() {
    this.code = this.code.replace(/\r\n/g,"\n").replace(/\r/g,"\n");
    const lines = this.code.split("\n");
    for (let i = 0; i < lines.length; i++) {
      const line_num = i + 1;
      const line = lines[i];
      if (!line.trim()) continue;
      this.invalid_char(line, line_num);
      this.mixed_indent(line, line_num);
      const indent_level = line.length - line.trimStart().length;
      this.handleindentation(indent_level, line_num);
      const stripped = line.trim();
      if (stripped.startsWith("#")) {
        this.tokens.push(new Token(TokenType.COMMENT, stripped, line_num, 1));
        continue;
      }
      this.tokenizeline(stripped, line_num, indent_level);
      this.tokens.push(new Token(TokenType.NEWLINE, "\\n", line_num, line.length));
    }
    const final_line = lines.length;
    while (this.indent_stack.length > 1) {
      this.indent_stack.pop();
      this.tokens.push(new Token(TokenType.DEDENT, "", final_line, 0));
    }
    this.tokens.push(new Token(TokenType.EOF, "", final_line, 0));
    return this.tokens;
  }

  // mirrors Lexer.invalid_char()
  invalid_char(line, line_num) {
    const pos = line.indexOf("\t");
    if (pos !== -1)
      throw new LexerError("Tab character found", line_num, pos + 1, "Use spaces instead of tabs");
  }

  // mirrors Lexer.mixed_indent()
  mixed_indent(line, line_num) {
    const indent = line.slice(0, line.length - line.trimStart().length);
    if (indent.includes("\t") && indent.includes(" "))
      throw new LexerError("Mixed tabs and spaces", line_num, 1, "Use only spaces for indentation");
  }

  // mirrors Lexer.handleindentation()
  handleindentation(indent_level, line_num) {
    const current = this.indent_stack[this.indent_stack.length - 1];
    if (indent_level > current) {
      this.indent_stack.push(indent_level);
      this.tokens.push(new Token(TokenType.INDENT, "", line_num, 1));
    } else if (indent_level < current) {
      while (this.indent_stack.length && indent_level < this.indent_stack[this.indent_stack.length - 1]) {
        this.indent_stack.pop();
        this.tokens.push(new Token(TokenType.DEDENT, "", line_num, 1));
      }
    }
  }

  // mirrors Lexer.tokenizeline()
  tokenizeline(line, line_num, base_column) {
    let i = 0;
    while (i < line.length) {
      const char = line[i];
      const column = base_column + i + 1;
      if (char === " ") { i++; continue; }
      if (/\d/.test(char)) {
        const [num, len] = this.parsenumber(line, i);
        this.tokens.push(new Token(TokenType.NUMBER, num, line_num, column));
        i += len; continue;
      }
      if (char === "'" || char === '"') {
        const [str, len] = this.parsestring(line, i);
        this.tokens.push(new Token(TokenType.STRING, str, line_num, column));
        i += len; continue;
      }
      if (/[a-zA-Z_]/.test(char)) {
        const [ident, len] = this.parseidentifier(line, i);
        const token_type = this.keywords.has(ident) ? ident : TokenType.IDENTIFIER;
        this.tokens.push(new Token(token_type, ident, line_num, column));
        i += len; continue;
      }
      if (i + 1 < line.length) {
        const two = line.slice(i, i + 2);
        const two_ops = {
          "//":TokenType.FLOOR_DIVIDE, "**":TokenType.POWER,
          "==":TokenType.DOUBLE_EQUALS, "!=":TokenType.NOT_EQUALS,
          "<=":TokenType.LESS_EQUAL, ">=":TokenType.GREATER_EQUAL
        };
        if (two in two_ops) {
          this.tokens.push(new Token(two_ops[two], two, line_num, column));
          i += 2; continue;
        }
      }
      const single = {
        "+":TokenType.PLUS, "-":TokenType.MINUS, "*":TokenType.MULTIPLY,
        "/":TokenType.DIVIDE, "%":TokenType.MODULO, "=":TokenType.EQUALS,
        "<":TokenType.LESS_THAN, ">":TokenType.GREATER_THAN,
        "(":TokenType.LPAREN, ")":TokenType.RPAREN,
        ",":TokenType.COMMA, ":":TokenType.COLON
      };
      if (char in single) {
        this.tokens.push(new Token(single[char], char, line_num, column));
        i++; continue;
      }
      throw new LexerError(`Unrecognized character '${char}'`, line_num, column);
    }
  }

  // mirrors Lexer.parsenumber()
  parsenumber(line, start) {
    let i = start;
    while (i < line.length && (/\d/.test(line[i]) || line[i] === ".")) i++;
    return [line.slice(start, i), i - start];
  }

  // mirrors Lexer.parsestring()
  parsestring(line, start) {
    const quote = line[start]; let i = start + 1; let string = "";
    while (i < line.length) {
      if (line[i] === quote) return [string, i - start + 1];
      string += line[i]; i++;
    }
    throw new LexerError("Unclosed string", 0, start);
  }

  // mirrors Lexer.parseidentifier()
  parseidentifier(line, start) {
    let i = start;
    while (i < line.length && /[a-zA-Z0-9_]/.test(line[i])) i++;
    return [line.slice(start, i), i - start];
  }
}

// ─────────────────────────────────────────────────────────
// print_tokens() — exact port of print_tokens() in transpiler.py
//   header: "TYPE                 VALUE"  + dashes
//   each row: token.type.name padded to 20, then repr(token.value)
//   skips EOF tokens
// ─────────────────────────────────────────────────────────
function print_tokens(tokens) {
  const lines = [];
  lines.push("TYPE                 VALUE");
  lines.push("-".repeat(40));
  for (const token of tokens) {
    if (token.type === TokenType.EOF) continue;
    const name  = ttName(token.type).padEnd(20);
    const value = "'" + String(token.value).replace(/\\/g,"\\\\").replace(/'/g,"\\'") + "'";
    lines.push(`${name} ${value}`);
  }
  return lines.join("\n");
}

// ─────────────────────────────────────────────────────────
// UI — filling in what the original script block was missing
// ─────────────────────────────────────────────────────────
let activeTab = "tokens";
let result = null;

const editor = document.getElementById("editor");
const output = document.getElementById("output");
const btnRun = document.getElementById("btnRun");

document.getElementById("btnClear").onclick = () => {
  editor.value = "";
  output.textContent = "Cleared.";
  result = null;
};

document.querySelectorAll(".tab").forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    activeTab = tab.dataset.tab;
    render();
  };
});

function render() {
  if (!result) { output.textContent = "Write code and click Transpile..."; return; }
  if (activeTab === "tokens") {
    if (result.error) {
      output.textContent =
        "LEXER ERROR\n" +
        "Message   : " + result.error.message + "\n" +
        "Line      : " + result.error.line    + "\n" +
        "Column    : " + result.error.column  +
        (result.error.suggestion ? "\nSuggestion: " + result.error.suggestion : "");
    } else {
      output.textContent = result.tokens;
    }
  } else {
    output.textContent = "Not Working.";
  }
}

btnRun.onclick = () => {
  const source = editor.value;
  if (!source.trim()) { output.textContent = "Write code and click Transpile..."; result = null; return; }
  try {
    const tokens = new Lexer(source).tokenize();
    result = { tokens: print_tokens(tokens), error: null };
  } catch (e) {
    result = {
      tokens: null,
      error: e instanceof LexerError
        ? { message: e.message, line: e.line, column: e.column, suggestion: e.suggestion }
        : { message: e.message, line: "?", column: "?", suggestion: null }
    };
  }
  // always land on tokens tab
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelector('[data-tab="tokens"]').classList.add("active");
  activeTab = "tokens";
  render();
};
</script>

</body>
</html>
